name: Deploy

on:
  push:
    branches:
      - main

env:
  PROJECT_DIR: /home/esteban/CICD-test

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_cicd
          chmod 600 ~/.ssh/id_cicd
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_cicd ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ${{ env.PROJECT_DIR }}
            git pull origin main
            docker compose up -d --build
            docker image prune -f
            echo 'Done ✓'
          "
